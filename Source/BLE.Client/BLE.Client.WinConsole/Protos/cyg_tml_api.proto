syntax = "proto3";                            
package Cygnus;                       

/* ---------------------------------------------------------------------------------------------------
 *
 * BLE Arangement.
 * The C1Ex Gauge is the Server, peripheral role.
 * The PC/Table is the Client, central role.
 *
 * The Client always initiates an exchange by sending a Command to the Server, the Server will respond
 * to a Command by making a Message available for the Client to read. The Client subscribes to a Notify
 * characteristic that signals a new message is ready to read.
 *
 * The Server profile exposes these characteristics for communication.
 * WRITE  - For the Client to write command.
 * NOTIFY - For the Client to be notified of a new Message.
 * READ   - So the Client can read a Message from the server.
 *
 * --------------------------------------------------------------------------------------------------- */


/* =====================================================================================================
 * NotifyMessageReady is used to notify the client that a new MessageHeader and Message object is ready. 
 */
message NotifyMessageReady
{
	// The command that triggered this message. (1 byte)
	CommandType commandType = 1;
}


/* =====================================================================================================
 * Command contains the Command send from the PC to the gauge.
 */
message Command
{
	// The command type.
	CommandType commandType = 1;
	
	// Optional name of a record to get/delete.
	string recordName = 2;				// max length = 24 chars.
	
	// An Optional blank record.
	BlankRecord blankRecord = 3;

	// ---------------------------------------------------------------
	// Blank Record for a SetRecord Command.
	message BlankRecord
	{
		string recordName = 1;			// max length = 24 chars.
		RecordType recordType = 2;
	}
}


/* =====================================================================================================
 * Message contains the message sent from the gauge to the PC in responce to a received Command.
 * Example, for a GetRecodList command, the reply would be
 * [Message] with [RecordList] data.
 */
message Message
{
	// The command that triggered this message.
	CommandType commandType = 1;
	
	// The ack value.
	MessageAckType messageAckType = 2;
	
	// An optional Record List.
	RecordList recordList = 3;
	
	// An optional Record.
	Record record = 4;	
	
	// ---------------------------------------------------------------
	// A MessageRecordList in reposnse to a GetRecordList command.
	// Contains a list of Record found on the gauge.
	message RecordList
	{
		message RecordListItem
		{
			string recordName = 1;			// max length = 24 chars.
			RecordType recordType = 2;
			uint32 numPointsRequired = 3;
			uint32 numPointsTaken = 4;
		}

		// 0=No Records Found, Maximum=100 Records.
		uint32 numRecords = 1; 
		
		// Array of 0..N record items.
		repeated RecordListItem recordListItem = 2;
	}

	
	// ---------------------------------------------------------------
	// A Record in reposnse to a GetRecord command.
	message Record
	{
		message RecordMPoint
		{
			string name = 1;			// max length = 24 chars.
		}
	
		string recordName = 1;			// max length = 24 chars.
		RecordType recordType = 2;
		uint32 numPointsRequired = 3;
		uint32 numPointsTaken = 4;
		
		// Array of 0..N MPoints.
		repeated RecordMPoint recordMPoint = 5;
	}
}




/* CommandType lists all the commands that can be sent from PC to gauge. 
 */
enum CommandType 
{                      
	Non = 0;             
    GetRecordList = 1;		// requests the RecordList
	GetRecord = 2;			// requests a Record
	DeleteRecord = 3;		// requests a Record is deleted
	SetRecord = 4;			// sends a new Record
}


/* MessageAckType is used to signal if a command was successful or not.
 * For example, after a DeleteRecord command is send, the gauge would replay with a ACK when the 
 * file was successfully deleted. 
 */
enum MessageAckType
{
	NAK = 0;
	ACK = 172;  // =0xAC
}


/* RecordType is the type of record. 
 */
enum RecordType 
{
    Linear = 0;
    Grid = 1;
}
  

